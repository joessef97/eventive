    <section id="contact">

        <h1 class="section-header">Contact Us</h1>

        <div class="contact-wrapper" style="bottom: 0px;top: 0px;right: 0px;left: 0;">


            <form>

                <div class="form-group">
                    <div class="col-sm-12">
                        <input type="text" class="form-control" id="name" placeholder="NAME" name="name" value="" required style="margin-top: 175px;margin-bottom: 15px;">
                    </div>
                </div>

                <div class="form-group">
                    <div class="col-sm-12">
                        <input type="email" class="form-control" id="email" placeholder="EMAIL" name="email" value="" required style="margin-bottom: 15px">
                    </div>
                </div>

                <textarea class="form-control" rows="10" placeholder="MESSAGE" name="message" required style="width: 300px; height: 193px"></textarea>

                <button class="btn btn-primary send-button" id="submit" type="submit" value="SEND">
                     
                        <i class="fa fa-paper-plane"></i><span class="send-text">SEND</span>
                    

                </button>

            </form>


            <div class="direct-contact-container">

                <ul class="contact-list" style="margin-top: 175px; margin-bottom: 50px; margin-left: 0px;">
                    <li class="list-item"><i class="fa fa-map-marker fa-2x"><span class="contact-text place">Cairo, Egypt</span></i></li>

                    <li class="list-item"><i class="fa fa-phone fa-2x"><span class="contact-text phone"><a href="tel:1-212-555-5555" title="Give me a call">(20) 1223456789 </a></span></i></li>

                    <li class="list-item"><i class="fa fa-envelope fa-2x"><span class="contact-text gmail"><a href="mailto:#" title="Send me an email">Customer@eventive.com</a></span></i></li>

                </ul>

            </div>

        </div>

    </section>
